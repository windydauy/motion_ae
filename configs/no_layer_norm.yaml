# ============================================================
# motion_ae 默认配置（关闭 LayerNorm 版本）
# ============================================================

# --- 数据 ---
data:
  # 支持单个 npz 路径或包含 motion.npz 的根目录 /home/humanoid/yzh/TextOp/trip_npz_filtered/optitrack_data/BOXING_WALK/
  data_path: "/home/humanoid/yzh/TextOp/trip_npz_filtered/optitrack_data/BOXING_WALK/" # /home/humanoid/yzh/TextOp/motion_ae/converted_1031/
  npz_filename: "motion.npz"
  val_ratio: 0.2          # 按文件级别划分验证集比例

# --- NPZ 键名映射（如果你的 npz 字段名不同，在这里修改） ---
npz_keys:
  joint_pos: "joint_pos"
  joint_vel: "joint_vel"
  body_pos_w: "body_pos_w"
  body_quat_w: "body_quat_w"
  body_lin_vel_w: "body_lin_vel_w"
  body_ang_vel_w: "body_ang_vel_w"
  fps: "fps"

# --- Pelvis / Anchor 配置 ---
pelvis:
  body_index: 0            # pelvis 在 body 维度中的索引

# --- 特征构建 ---
feature:
  # 各特征组及其在最终特征向量中的维度范围（自动计算，此处仅做参考）
  # joint_pos:       [0, num_joints)
  # joint_vel:       [num_joints, 2*num_joints)
  # pelvis_rot6d_b:  [2*num_joints, 2*num_joints+6)
  # pelvis_lin_vel_b:[2*num_joints+6, 2*num_joints+9)
  # pelvis_ang_vel_b:[2*num_joints+9, 2*num_joints+12)
  groups:
    - name: "joint_pos"
    - name: "joint_vel"
    - name: "pelvis_rot6d_b"
    - name: "pelvis_lin_vel_b"
    - name: "pelvis_ang_vel_b"

# --- 滑窗 ---
window_size: 20
stride: 4

# --- 模型 ---
model:
  encoder_hidden_dims: [2048, 1024, 512, 512]
  decoder_hidden_dims: [2048, 1024, 512, 512]
  ifsq_levels: [32, 32, 32, 32, 32, 32, 32, 32, 32, 32, 32, 32, 32, 32, 32, 32, 32, 32, 32, 32, 32, 32, 32, 32, 32, 32, 32, 32, 32, 32, 32, 32]

  activation: "silu"
  use_layer_norm: false

# --- 训练 ---
training:
  batch_size: 1024
  learning_rate: 1.0e-3
  weight_decay: 1.0e-5
  num_epochs: 30000
  num_workers: 4
  seed: 42
  save_every: 500            # 每 N epoch 保存一次 checkpoint
  output_root: "outputs"
  experiment_name: "motion_ae"
  run_name: ""
  device: "auto"

# --- 日志 / 追踪 ---
logger:
  logger: "wandb"
  log_project_name: "motion_ae"
  wandb_entity: null
  wandb_mode: "online"
  wandb_tags: []
  wandb_notes: ""
  save_code: false

# --- 损失 ---
loss:
  type: "mse"
  # 分组权重（默认全部为 1.0，后续可按需调整）
  group_weights:
    joint_pos: 1.0
    joint_vel: 1.0
    pelvis_rot6d_b: 1.0
    pelvis_lin_vel_b: 1.0
    pelvis_ang_vel_b: 1.0

# --- 归一化 ---
normalization:
  eps: 1.0e-6              # std 下限保护
  stats_file: "stats.npz"

# --- 调试 ---
debug: false
